openapi: 3.1.0
info:
  title: 网络安全漏洞管理平台 · 开放平台 API
  version: 2.2.6
  description: |
    对外第三方集成统一契约（Partner 接入）。

    - 设计依据：《漏洞管理平台对外集成能力设计方案》V2.2.3
    - 漏洞实例字段与部侧表34 **同名**：`vulInfoID`、`vulInfoStat`、`vulName`、`vulNetAddr`、`remedDesc`、`srcMethod` 等
    - Base path：`/api/open/v1`
    - 鉴权：`Authorization: Bearer` 或 `X-Api-Key` + `X-Signature`（HMAC-SHA256）
    - 响应包装：除特别说明外，HTTP 200 仍使用业务 `code` 区分成功/失败
    - 幂等：`extTaskId` **仅创建任务**必填；查询任务只需 `taskId`
    - 调 SVMP：`extTaskId` 不下发；查询进度仅 SVMP `taskId`

    ## 生命周期

    排查 → 验证 → **处置（修复 | 备案，二选一）** → 核验（引擎）

    | 处置分支 | 路径 | 终态 |
    |----------|------|------|
    | 可修复 | `POST .../remediate` | vulInfoStat=5 |
    | 不可修复备案 | `POST .../archive` | vulInfoStat=9 + lvRsn |
  contact:
    name: Platform Integration Team
  license:
    name: Proprietary

servers:
  - url: https://{host}/api/open/v1
    description: 生产环境
    variables:
      host:
        default: vuln-platform.example.com
  - url: https://{host}/api/open/v1
    description: 测试环境
    variables:
      host:
        default: vuln-platform-test.example.com

tags:
  - name: tasks
    description: 扫描/排查任务
  - name: instances
    description: 漏洞实例查询与生命周期
  - name: webhooks
    description: 平台 → Partner 回调（由 Partner 实现接收端）

security:
  - bearerAuth: []
  - apiKeyAuth: []

paths:
  /tasks:
    post:
      tags: [tasks]
      operationId: createTask
      summary: 创建扫描任务
      description: |
        排查阶段入口。需能力 `TASK_WRITE`。
        `extTaskId` 为 Partner 幂等键，仅在本接口必填；保存在平台映射表，不下发 SVMP。
        成功后新发现漏洞实例默认 `vulInfoStat = 1`（初始发现）。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
            examples:
              minimal:
                value:
                  extTaskId: EXT-2026-0001
                  taskName: 季度系统漏洞排查
                  targets: ['10.0.0.1', '10.0.0.2']
                  targetType: IPV4
                  vulnType: 1
      responses:
        '200':
          description: 业务响应（检查 body.code）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreateTaskResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    get:
      tags: [tasks]
      operationId: listTasks
      summary: 分页查询任务列表
      description: |
        需能力 `TASK_READ`。查询平台任务库；`extTaskId` 仅为可选过滤条件，不调用 SVMP。
        响应 items 中**必含 taskId**（及建议回显 extTaskId），用于后续查进度。
      parameters:
        - name: extTaskId
          in: query
          schema:
            type: string
          description: Partner 任务键过滤（非 SVMP 参数）
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TaskProgressStatus'
        - name: createdFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: createdTo
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskListPage'

  /tasks/{taskId}:
    get:
      tags: [tasks]
      operationId: getTask
      summary: 查询任务进度
      description: |
        需能力 `TASK_READ`。仅需路径参数 `taskId`（创建任务响应中返回），**无需** `extTaskId`。
        平台内部转换为 SVMP `taskId` 后调用 `GET /task/progress`。
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskProgress'

  /instances/search:
    post:
      tags: [instances]
      operationId: searchInstances
      summary: 分页搜索漏洞实例
      description: |
        需能力 `INSTANCE_READ`。
        查询参数 `exportProfile=MIIT-2025` 可返回部侧字段名版本（若 Partner 已开通合规档）。
      parameters:
        - name: exportProfile
          in: query
          schema:
            type: string
            enum: [MIIT-2025]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstanceSearchRequest'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InstanceListPage'

  /instances/{vulInfoID}:
    get:
      tags: [instances]
      operationId: getInstance
      summary: 获取漏洞实例详情
      description: 返回表34 相关字段（`vulName`、`vulNetAddr`、`remedDesc` 等）及备案扩展字段。
      parameters:
        - $ref: '#/components/parameters/VulInstanceId'
        - name: extTaskId
          in: query
          schema:
            type: string
          description: 可选，关联任务过滤上下文
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VulInfoDetail'

  /instances/{vulInfoID}/verify:
    post:
      tags: [instances]
      operationId: verifyInstance
      summary: 验证漏洞实例
      description: |
        验证阶段。需能力 `INSTANCE_VERIFY`。
        以路径参数 vulInfoID 标识实例，**不需要** extTaskId / taskId。
        verifyResult：VALID→vulInfoStat=2；FALSE_POSITIVE→vulInfoStat=3。
      parameters:
        - $ref: '#/components/parameters/VulInstanceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyInstanceRequest'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InstanceTransitionResult'

  /instances/verify:batch:
    post:
      tags: [instances]
      operationId: verifyInstanceBatch
      summary: 批量验证漏洞实例
      description: |
        部分成功模式。每条由 items[].vulInfoID 标识，**不需要** extTaskId。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyInstanceBatchRequest'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VerifyInstanceBatchResult'

  /instances/{vulInfoID}/remediate:
    post:
      tags: [instances]
      operationId: remediateInstance
      summary: 处置·修复（可修复）
      description: |
        处置阶段分支之一。需能力 `INSTANCE_REMEDIATE`。
        前置：`vulInfoStat ∈ {2, 7}`，且未处于终态 5/9。
        后置：`vulInfoStat=5`，清空 `lvRsn`。
      parameters:
        - $ref: '#/components/parameters/VulInstanceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemediateInstanceRequest'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InstanceTransitionResult'

  /instances/{vulInfoID}/archive:
    post:
      tags: [instances]
      operationId: archiveInstance
      summary: 处置·备案（不可修复）
      description: |
        处置阶段分支之一，与 `remediate` 互斥。需能力 `INSTANCE_ARCHIVE`。
        后置：`vulInfoStat=9`，必填 `lvRsn`。
        `archiveExtension.provincialFields` 为省侧扩展预留。
      parameters:
        - $ref: '#/components/parameters/VulInstanceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveInstanceRequest'
            examples:
              acceptRisk:
                value:
                  lvRsn: 109
                  archiveReason: 业务连续性限制，评估后接受风险
                  operator: owner@corp.com
                  approvedBy: manager@corp.com
                  recordAt: '2026-05-16T11:00:00Z'
                  provincialFields: {}
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InstanceTransitionResult'

  /instances/{vulInfoID}/unfixable-records:
    post:
      tags: [instances]
      operationId: archiveInstanceLegacy
      summary: 处置·备案（兼容别名）
      deprecated: true
      description: |
        **已废弃**。请使用 `POST .../archive`。
        请求体与 `archive` 相同，平台内部转发。
      parameters:
        - $ref: '#/components/parameters/VulInstanceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArchiveInstanceRequest'
      responses:
        '200':
          description: 同 archive
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InstanceTransitionResult'

webhooks:
  platformCallback:
    post:
      tags: [webhooks]
      operationId: receivePlatformWebhook
      summary: 平台事件回调（Partner 实现）
      description: |
        由平台向 Partner 注册的 `callbackUrl` 投递（非本平台提供的路径）。
        签名校验：`X-Webhook-Signature`、`X-Webhook-Timestamp`（5 分钟有效）。
      parameters:
        - name: X-Webhook-Signature
          in: header
          required: true
          schema:
            type: string
        - name: X-Webhook-Timestamp
          in: header
          required: true
          schema:
            type: string
            description: Unix 时间戳（秒）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformWebhookEvent'
      responses:
        '200':
          description: Partner 接收成功
        '4XX':
          description: Partner 拒绝；平台将按策略重试

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Partner 访问令牌
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: 与 `X-Signature`（HMAC-SHA256）配合使用

  parameters:
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
      description: 平台内部任务 ID
    VulInstanceId:
      name: vulInfoID
      in: path
      required: true
      schema:
        type: string
      description: 系统漏洞实例 ID（部侧 vulInfoID，漏洞实例主键）
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: 写操作幂等键
    Page:
      name: page
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
        default: 1
    Size:
      name: size
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 20

  responses:
    Unauthorized:
      description: 鉴权失败（code 40101）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            code: 40101
            message: unauthorized
            data: null
            requestId: req-401
    Forbidden:
      description: 能力未开通（code 40301）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    TooManyRequests:
      description: 限流（code 42901）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

  schemas:
    ApiResponse:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          type: integer
          description: |
            业务状态码。0=成功。
            常见：40001 参数错误，40002 状态机不允许，40005 处置互斥，
            40101 鉴权失败，40301 能力未开通，40901 幂等冲突，50001 引擎失败
          examples: [0]
        message:
          type: string
          examples: [ok]
        data:
          nullable: true
          description: 成功时承载业务数据；失败时为 null 或错误详情
        requestId:
          type: string
          description: 请求追踪 ID

    TargetType:
      type: string
      enum: [IPV4, IPV6, URL]

    VulnType:
      type: integer
      description: 漏洞类型（与 V1.1 一致）
      enum: [1, 2]
      x-enum-descriptions:
        - 系统漏洞
        - Web漏洞

    VulLevel:
      type: integer
      minimum: 1
      maximum: 5
      description: 危害等级（部侧 vulLevel）

    TaskPriority:
      type: string
      enum: [LOW, MEDIUM, HIGH]

    TaskAcceptStatus:
      type: string
      enum: [ACCEPTED, QUEUED, REJECTED]

    TaskProgressStatus:
      type: string
      enum: [PENDING, RUNNING, FINISHED, FAILED]

    VulInfoStat:
      type: integer
      description: 系统漏洞状态，部侧附录 A.8（vulInfoStat）
      minimum: 0
      maximum: 10
      examples: [1, 2, 5, 9]

    LvRsnCode:
      type: integer
      description: 映射部侧 lvRsn（A.23）
      enum: [101, 102, 103, 104, 105, 107, 108, 109, 999]

    VerifyResult:
      type: string
      enum: [VALID, FALSE_POSITIVE]

    IsAccess:
      type: integer
      description: 部侧 isAccess，0=内网，1=互联网
      enum: [0, 1]

    ScanTaskOptions:
      type: object
      properties:
        portScope:
          type: string
          example: '1-65535'
        isLiveProbe:
          type: boolean
          default: true
        pswdGuessEnabled:
          type: boolean
          default: false

    CreateTaskRequest:
      type: object
      required: [extTaskId, taskName, targets, targetType, vulnType]
      properties:
        extTaskId:
          type: string
          maxLength: 128
          description: Partner 幂等键（仅创建任务使用，查询类接口不需要）
        taskName:
          type: string
          maxLength: 256
        targets:
          type: array
          minItems: 1
          items:
            type: string
        targetType:
          $ref: '#/components/schemas/TargetType'
        vulnType:
          $ref: '#/components/schemas/VulnType'
        callbackUrl:
          type: string
          format: uri
          description: 覆盖 Partner 默认回调地址
        scanTemplateId:
          type: integer
          description: 引擎扫描模板 ID
        priority:
          $ref: '#/components/schemas/TaskPriority'
        scheduleTime:
          type: string
          format: date-time
        options:
          $ref: '#/components/schemas/ScanTaskOptions'

    CreateTaskResponse:
      type: object
      required: [extTaskId, taskId, status, createdAt]
      properties:
        extTaskId:
          type: string
        taskId:
          type: string
        status:
          $ref: '#/components/schemas/TaskAcceptStatus'
        createdAt:
          type: string
          format: date-time

    TaskProgress:
      type: object
      required: [taskId, status]
      properties:
        extTaskId:
          type: string
        taskId:
          type: string
        status:
          $ref: '#/components/schemas/TaskProgressStatus'
        progress:
          type: integer
          minimum: 0
          maximum: 100
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        errorMessage:
          type: string

    TaskSummary:
      description: |
        任务列表项。必须包含 taskId，供 Partner 调用 GET /tasks/{taskId}；
        查询列表时无需传 extTaskId，但响应中会回显 extTaskId（若有）。
      allOf:
        - $ref: '#/components/schemas/TaskProgress'
        - type: object
          required: [taskName, createdAt]
          properties:
            taskName:
              type: string
            createdAt:
              type: string
              format: date-time

    TaskListPage:
      type: object
      required: [items, page, size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskSummary'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer

    InstanceSearchRequest:
      type: object
      required: [page, size]
      properties:
        taskId:
          type: string
          description: 平台任务 ID；调 SVMP 时仅传映射后的 SVMP taskId
        extTaskId:
          type: string
          description: 可选；平台解析为 taskId，不传给 SVMP
        vulInfoStatList:
          type: array
          items:
            $ref: '#/components/schemas/VulInfoStat'
        vulLevelList:
          type: array
          items:
            $ref: '#/components/schemas/VulLevel'
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
          maximum: 1000

    VulInfoSummary:
      type: object
      required:
        - vulInfoID
        - vulInfoStat
        - vulName
        - transferTime
      properties:
        vulInfoID:
          type: string
        vulID:
          type: string
        vulInfoStat:
          $ref: '#/components/schemas/VulInfoStat'
        lvRsn:
          $ref: '#/components/schemas/LvRsnCode'
          nullable: true
        vulName:
          type: string
        vulLevel:
          $ref: '#/components/schemas/VulLevel'
        orgVulId:
          type: string
        vulNetAddr:
          type: string
        vulPort:
          type: integer
        vulSvc:
          type: string
        isAccess:
          $ref: '#/components/schemas/IsAccess'
        transferTime:
          type: string
          description: 状态变更时间（部侧多为 Unix 秒字符串）
        vulnDisposalId:
          type: string
          description: SVMP 处置 ID（引擎映射）
        extVulnRef:
          type: string
          description: Partner 扩展引用

    InstanceListPage:
      type: object
      required: [items, page, size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VulInfoSummary'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer

    RemedInfo:
      type: object
      description: 修复台账（部侧 remedInfo / 表34 相关字段）
      properties:
        srcMethod:
          type: integer
          description: 处置方式 A.10，如 1050
        remedDesc:
          type: string
        fixLnk:
          type: string
          format: uri
        defDev:
          type: string
        remedTime:
          type: string
          example: '3日'

    VulInfoDetail:
      allOf:
        - $ref: '#/components/schemas/VulInfoSummary'
        - type: object
          properties:
            vulAddrType:
              type: integer
              description: 1=IPv4, 2=IPv6, 3=HTTP, 4=N/A, 5=其他
            assetID:
              type: string
            assetName:
              type: string
            vulInstCpe:
              type: string
            remedDesc:
              type: string
            fixLnk:
              type: string
            defDev:
              type: string
            remedTime:
              type: string
            srcMethod:
              type: integer
            archiveReason:
              type: string
            provincialFields:
              type: object
              additionalProperties: true
            extVulnRef:
              type: string

    VerifyInstanceRequest:
      type: object
      required: [vulnType, verifyResult, operator]
      properties:
        vulnType:
          $ref: '#/components/schemas/VulnType'
        verifyResult:
          $ref: '#/components/schemas/VerifyResult'
          description: VALID→vulInfoStat=2；FALSE_POSITIVE→vulInfoStat=3
        srcMethod:
          type: integer
          description: 部侧 A.10 处置方式码（如 1021、1026）
        transferTime:
          type: string
        operator:
          type: string
        remark:
          type: string

    VerifyInstanceBatchRequest:
      type: object
      required: [items, operator]
      properties:
        operator:
          type: string
        items:
          type: array
          minItems: 1
          maxItems: 500
          items:
            type: object
            required: [vulInfoID, vulnType, verifyResult]
            properties:
              vulInfoID:
                type: string
              vulnType:
                $ref: '#/components/schemas/VulnType'
              verifyResult:
                $ref: '#/components/schemas/VerifyResult'
              srcMethod:
                type: integer
              remark:
                type: string

    VerifyBatchFailure:
      type: object
      required: [vulInfoID, code, message]
      properties:
        vulInfoID:
          type: string
        code:
          type: integer
        message:
          type: string

    VerifyInstanceBatchResult:
      type: object
      required: [success, failed]
      properties:
        success:
          type: array
          items:
            $ref: '#/components/schemas/InstanceTransitionResult'
        failed:
          type: array
          items:
            $ref: '#/components/schemas/VerifyBatchFailure'

    RemediateInstanceRequest:
      type: object
      required: [srcMethod, remedDesc, remedTime, operator]
      properties:
        srcMethod:
          type: integer
          description: A.10，如 1050/1051/1052
        remedDesc:
          type: string
        fixLnk:
          type: string
          format: uri
          description: srcMethod=1050 时必填
        defDev:
          type: string
          description: srcMethod=1051 或 1052 时必填
        remedTime:
          type: string
          pattern: '^\d+(日|周|月)$'
          example: '3日'
        operator:
          type: string
        transferTime:
          type: string
        remark:
          type: string

    ArchiveInstanceRequest:
      type: object
      required: [lvRsn, archiveReason, operator]
      properties:
        lvRsn:
          $ref: '#/components/schemas/LvRsnCode'
        archiveReason:
          type: string
        operator:
          type: string
        approvedBy:
          type: string
        recordAt:
          type: string
        provincialFields:
          type: object
          additionalProperties: true

    InstanceTransitionResult:
      type: object
      required: [vulInfoID, vulInfoStat]
      properties:
        vulInfoID:
          type: string
        vulInfoStat:
          $ref: '#/components/schemas/VulInfoStat'
        lvRsn:
          $ref: '#/components/schemas/LvRsnCode'
          nullable: true
        transferTime:
          type: string
        srcMethod:
          type: integer
        remedDesc:
          type: string
        archiveReason:
          type: string

    PlatformWebhookEventType:
      type: string
      enum:
        - TASK_COMPLETED
        - TASK_FAILED
        - INSTANCE_STATUS_CHANGED
        - INSTANCE_REMEDIATED
        - INSTANCE_ARCHIVED
        - EXPORT_READY

    TaskCompletedPayload:
      type: object
      properties:
        extTaskId:
          type: string
        taskId:
          type: string
        status:
          type: string
          enum: [FINISHED, FAILED]
        summary:
          type: object
          properties:
            totalInstances:
              type: integer
            verifiedValid:
              type: integer
            falsePositive:
              type: integer

    InstanceEventPayload:
      type: object
      properties:
        vulInfoID:
          type: string
        vulInfoStat:
          $ref: '#/components/schemas/VulInfoStat'
        previousVulInfoStat:
          $ref: '#/components/schemas/VulInfoStat'

    PlatformWebhookEvent:
      type: object
      required: [eventId, eventType, occurredAt, partnerId, payload]
      properties:
        eventId:
          type: string
        eventType:
          $ref: '#/components/schemas/PlatformWebhookEventType'
        occurredAt:
          type: string
          format: date-time
        partnerId:
          type: string
        payload:
          oneOf:
            - $ref: '#/components/schemas/TaskCompletedPayload'
            - $ref: '#/components/schemas/InstanceEventPayload'
          description: 结构随 eventType 变化
