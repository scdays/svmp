openapi: 3.1.0
info:
  title: 网络安全漏洞管理平台 · 开放平台 API
  version: 1.0.0
  description: |
    对外第三方集成统一契约（Partner 接入）。

    - 接口规范：[`docs/external/开放平台API接口规范.md`](../docs/external/开放平台API接口规范.md)
    - 漏洞实例字段与部侧表34 **同名**：`vulInfoID`、`vulInfoStat`、`vulName`、`vulNetAddr`、`remedDesc`、`srcMethod` 等
    - Base path：`/api/open/v1`
    - 鉴权：**v1.0.0 仅支持** `Authorization: Bearer`（OAuth 2.0 Client Credentials）；API Key + HMAC 暂未开放
    - 响应包装：除特别说明外，HTTP 200 仍使用业务 `code` 区分成功/失败
    - 幂等：创建任务用 `extTaskId` 或 `Idempotency-Key`；实例写 `{动作}:{vulInfoID}:{clientRequestId}`；批量 `{动作}:batch:{clientBatchId}`（详见接口规范 §4.2，默认保留 24h）
    - 调 SVMP：`extTaskId` 不下发；查询进度仅 SVMP `taskId`

    ## 生命周期

    排查 → 验证 → **处置**（`POST .../remediate`，含已修复 5 与修复失败 9）→ **修复核验**（`verify-fix`）
  contact:
    name: Platform Integration Team
  license:
    name: Proprietary

servers:
  - url: https://{host}/api/open/v1
    description: 生产环境
    variables:
      host:
        default: vuln-platform.example.com
  - url: https://{host}/api/open/v1
    description: 测试环境
    variables:
      host:
        default: vuln-platform-test.example.com

tags:
  - name: tasks
    description: 扫描/排查任务
  - name: instances
    description: 漏洞实例查询与生命周期
  - name: exports
    description: 任务结束数据外发查询与下载
  - name: webhooks
    description: 平台 → Partner 回调（由 Partner 实现接收端）

security:
  - bearerAuth: []

paths:
  /tasks:
    post:
      tags: [tasks]
      operationId: createTask
      summary: 创建扫描任务
      description: |
        需能力 `TASK_WRITE`。同一 `POST /tasks` 支持两种请求体（见接口规范 §5.1.1 / §5.1.2）：
        - **XML 配置**：`type` + `file`（WEB 应用扫描 **2**、口令猜测 **3**）；`file` 为 `<ScanTask>` XML，见接口规范附录 G
        - **漏洞扫描 JSON**：`type=1`，含 `targets`、`scanTemplateId` 等；`scanTemplateId` 缺省 **0** 按 `type` 自动匹配
        `exportTemplateId`：**0**=JSON 外发，**1**=XML 外发（缺省 0）
        `extTaskId` 为 Partner 幂等键；漏洞扫描成功后新实例默认 `vulInfoStat = 1`。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/CreateScanTaskByFileRequest'
                - $ref: '#/components/schemas/CreateVulnScanTaskRequest'
            examples:
              createScanByFile:
                summary: 创建 WEB 应用扫描（type=2 + file）
                value:
                  extTaskId: EXT-TASK-2026-WEB-0001
                  taskName: 2026Q2-核心站点 WEB 扫描
                  type: 2
                  file: '<?xml version="1.0" encoding="UTF-8"?><ScanTask><targets><target>https://www.example.com/</target></targets><scanTemplateId>0</scanTemplateId><priority>MEDIUM</priority><options><webScan><depth>3</depth><expVerify>false</expVerify></webScan></options></ScanTask>'
              createVulnScan:
                summary: 创建漏洞扫描任务（type=1）
                value:
                  extTaskId: EXT-TASK-2026-0001
                  taskName: 2026Q2-核心业务系统排查
                  type: 1
                  targets: ['10.10.1.1', '10.10.1.2', '2001:db8::1']
                  callbackUrl: https://partner.example.com/hooks/vuln
                  scanTemplateId: 0
                  srcMethod: 1021
                  exportTemplateId: 0
                  priority: HIGH
                  options:
                    portScope: '1-65535'
                    isLiveProbe: true
                    pswdGuessEnabled: false
      responses:
        '200':
          description: 业务响应（检查 body.code）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/CreateTaskResponse'
              examples:
                success:
                  summary: 创建成功
                  value:
                    code: 0
                    message: ok
                    requestId: req-20260517-t001
                    data:
                      extTaskId: EXT-TASK-2026-0001
                      taskId: TASK-7f3a2b1c
                      status: ACCEPTED
                      createdAt: '2026-05-17T08:00:00Z'
                idempotentConflict:
                  summary: extTaskId 幂等重复（40901，仍返回已有 taskId）
                  value:
                    code: 40901
                    message: extTaskId 已存在
                    requestId: req-20260517-t002
                    data:
                      extTaskId: EXT-TASK-2026-0001
                      taskId: TASK-7f3a2b1c
                      status: ACCEPTED
                      createdAt: '2026-05-17T08:00:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
    get:
      tags: [tasks]
      operationId: listTasks
      summary: 分页查询任务列表
      description: |
        需能力 `TASK_READ`。查询平台任务库；`extTaskId` 仅为可选过滤条件，不调用 SVMP。
        响应 items 中**必含 taskId**（及建议回显 extTaskId），用于后续查进度。
      parameters:
        - name: extTaskId
          in: query
          schema:
            type: string
          description: Partner 任务键过滤（非 SVMP 参数）
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/TaskProgressStatus'
        - name: createdFrom
          in: query
          schema:
            type: string
            format: date-time
        - name: createdTo
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskListPage'
              examples:
                success:
                  summary: 任务列表（items 必含 taskId）
                  value:
                    code: 0
                    message: ok
                    requestId: req-20260517-t020
                    data:
                      page: 1
                      size: 20
                      total: 1
                      items:
                        - taskId: TASK-7f3a2b1c
                          extTaskId: EXT-TASK-2026-0001
                          taskName: 2026Q2-核心业务系统排查
                          status: FINISHED
                          progress: 100
                          startedAt: '2026-05-17T08:00:05Z'
                          finishedAt: '2026-05-17T10:30:00Z'
                          errorMessage: null
                          createdAt: '2026-05-17T08:00:00Z'

  /tasks/{taskId}:
    get:
      tags: [tasks]
      operationId: getTask
      summary: 查询任务进度
      description: |
        需能力 `TASK_READ`。仅需路径参数 `taskId`（创建任务响应中返回），**无需** `extTaskId`。
        平台内部转换为 SVMP `taskId` 后调用 `GET /task/progress`。
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/TaskProgress'
              examples:
                running:
                  summary: 任务执行中
                  value:
                    code: 0
                    message: ok
                    requestId: req-20260517-t010
                    data:
                      extTaskId: EXT-TASK-2026-0001
                      taskId: TASK-7f3a2b1c
                      status: RUNNING
                      progress: 65
                      startedAt: '2026-05-17T08:00:05Z'
                      finishedAt: null
                      errorMessage: null

  /instances/search:
    post:
      tags: [instances]
      operationId: searchInstances
      summary: 分页搜索漏洞实例
      description: |
        需能力 `INSTANCE_READ`。
        查询参数 `exportProfile=MIIT-2025` 可返回部侧字段名版本（若 Partner 已开通合规档）。
      parameters:
        - name: exportProfile
          in: query
          schema:
            type: string
            enum: [MIIT-2025]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstanceSearchRequest'
            examples:
              byTaskId:
                summary: 按 taskId 检索实例
                value:
                  taskId: TASK-7f3a2b1c
                  vulInfoStatList: [1, 2]
                  vulLevelList: [3, 4]
                  page: 1
                  size: 50
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InstanceListPage'
              examples:
                success:
                  summary: 实例列表
                  value:
                    code: 0
                    message: ok
                    requestId: req-20260517-i001
                    data:
                      page: 1
                      size: 50
                      total: 2
                      items:
                        - vulInfoID: VI-20260517-0001
                          vulID: MVM-2019-1696145560773468160
                          vulInfoStat: 1
                          lvRsn: null
                          vulName: OpenSSL 心脏出血漏洞
                          vulLevel: 4
                          orgVulId: CVE-2014-0160
                          vulNetAddr: 10.10.1.1
                          vulPort: 443
                          vulSvc: https
                          isAccess: 0
                          transferTime: '1747468800'
                          vulnDisposalId: DISP-90001
                          extVulnRef: null
                        - vulInfoID: VI-20260517-0002
                          vulID: MVM-2019-1696145560773468161
                          vulInfoStat: 2
                          lvRsn: null
                          vulName: 弱口令
                          vulLevel: 3
                          orgVulId: null
                          vulNetAddr: 10.10.1.2
                          vulPort: 22
                          vulSvc: ssh
                          isAccess: 0
                          transferTime: '1747472400'
                          vulnDisposalId: DISP-90002
                          extVulnRef: null

  /instances/{vulInfoID}:
    get:
      tags: [instances]
      operationId: getInstance
      summary: 获取漏洞实例详情
      description: 返回表34 相关字段（`vulName`、`vulNetAddr`、`remedDesc` 等）及备案扩展字段。
      parameters:
        - $ref: '#/components/parameters/VulInstanceId'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VulInfoDetail'
              examples:
                success:
                  summary: 实例详情
                  value:
                    code: 0
                    message: ok
                    requestId: req-20260517-i010
                    data:
                      vulInfoID: VI-20260517-0002
                      vulID: MVM-2019-1696145560773468161
                      vulInfoStat: 2
                      lvRsn: null
                      vulName: 弱口令
                      vulLevel: 3
                      orgVulId: null
                      vulNetAddr: 10.10.1.2
                      vulPort: 22
                      vulSvc: ssh
                      isAccess: 0
                      transferTime: '1747472400'
                      vulnDisposalId: DISP-90002
                      assetID: AST-10002
                      assetName: 核心跳板机
                      vulInstCpe: 'cpe:2.3:a:openssh:openssh:8.0:*:*:*:*:*:*:*'
                      remedDesc: null
                      fixLnk: null
                      srcMethod: null
                      archiveReason: null
                      provincialFields: null

  /instances/{vulInfoID}/verify:
    post:
      tags: [instances]
      operationId: verifyInstance
      summary: 验证漏洞实例
      description: |
        验证阶段。需能力 `INSTANCE_VERIFY`。
        以路径参数 vulInfoID 标识实例，**不需要** extTaskId / taskId。
        verifyResult：VALID→vulInfoStat=2；FALSE_POSITIVE→vulInfoStat=3。
      parameters:
        - $ref: '#/components/parameters/VulInstanceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyInstanceRequest'
            examples:
              valid:
                summary: 验证有效（需 srcMethod）
                value:
                  verifyResult: VALID
                  srcMethod: 1021
                  operator: sec-analyst@corp.com
                  transferTime: '1747476000'
                  remark: POC 复核通过
              falsePositive:
                summary: 验证误报
                value:
                  verifyResult: FALSE_POSITIVE
                  operator: sec-analyst@corp.com
                  remark: 扫描策略误报
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InstanceTransitionResult'
              examples:
                validSuccess:
                  summary: vulInfoStat→2
                  value:
                    code: 0
                    message: ok
                    requestId: req-20260517-v001
                    data:
                      vulInfoID: VI-20260517-0001
                      vulInfoStat: 2
                      lvRsn: null
                      transferTime: '1747476000'
                      srcMethod: 1021
                falsePositiveSuccess:
                  summary: vulInfoStat→3
                  value:
                    code: 0
                    message: ok
                    requestId: req-20260517-v002
                    data:
                      vulInfoID: VI-20260517-0099
                      vulInfoStat: 3
                      lvRsn: null
                      transferTime: '1747476100'
                      srcMethod: null

  /instances/verify:batch:
    post:
      tags: [instances]
      operationId: verifyInstanceBatch
      summary: 批量验证漏洞实例
      description: |
        部分成功模式。每条由 items[].vulInfoID 标识，**不需要** extTaskId。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyInstanceBatchRequest'
            examples:
              batch:
                summary: 批量验证（部分成功）
                value:
                  operator: sec-analyst@corp.com
                  items:
                    - vulInfoID: VI-20260517-0001
                      verifyResult: VALID
                      srcMethod: 1021
                    - vulInfoID: VI-20260517-0002
                      verifyResult: VALID
                      srcMethod: 1026
                    - vulInfoID: VI-NOT-EXIST
                      verifyResult: VALID
                      srcMethod: 1021
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VerifyInstanceBatchResult'
              examples:
                partialSuccess:
                  summary: success / failed 分离
                  value:
                    code: 0
                    message: ok
                    requestId: req-20260517-v010
                    data:
                      success:
                        - vulInfoID: VI-20260517-0001
                          vulInfoStat: 2
                          lvRsn: null
                          transferTime: '1747476200'
                          srcMethod: 1021
                        - vulInfoID: VI-20260517-0002
                          vulInfoStat: 2
                          lvRsn: null
                          transferTime: '1747476201'
                          srcMethod: 1026
                      failed:
                        - vulInfoID: VI-NOT-EXIST
                          code: 40003
                          message: vulInfoID 不存在

  /instances/{vulInfoID}/remediate:
    post:
      tags: [instances]
      operationId: remediateInstance
      summary: 处置（含已修复与修复失败/备案）
      description: |
        需能力 `INSTANCE_REMEDIATE`。
        前置：`vulInfoStat ∈ {2, 7}`，且 `≠ 3`。
        可修复类 srcMethod（附录 D，1050–1053）→ `vulInfoStat=5`；修复失败/备案 → `vulInfoStat=9`，须传 `lvRsn`（附录 E）、`archiveReason`。
        工单字段（必填）：srcTktRole/dstTktRole、assignerDept/handlerDept；派单人/处置人邮箱与电话各至少填一项。
      parameters:
        - $ref: '#/components/parameters/VulInstanceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemediateInstanceRequest'
            examples:
              patchUpgrade:
                summary: 补丁升级修复（srcMethod=1050）
                value:
                  srcMethod: 1050
                  remedDesc: 升级 OpenSSH 至 9.6p1 并重启 sshd
                  fixLnk: https://www.openssh.com/releasenotes.html
                  remedTime: 3日
                  srcTktRole: 1
                  dstTktRole: 2
                  assignerDept: 安全运营中心
                  assignerEmail: soc-dispatch@corp.com
                  assignerPhone: '010-12345678'
                  handlerDept: 基础架构部
                  handlerEmail: ops@corp.com
                  handlerPhone: '010-87654321'
                  transferTime: '1747480000'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/InstanceTransitionResult'
              examples:
                success:
                  summary: vulInfoStat→5
                  value:
                    code: 0
                    message: ok
                    requestId: req-20260517-r001
                    data:
                      vulInfoID: VI-20260517-0002
                      vulInfoStat: 5
                      lvRsn: null
                      transferTime: '1747480000'
                      remedDesc: 升级 OpenSSH 至 9.6p1 并重启 sshd
                      srcMethod: 1050
                stateMachineDenied:
                  summary: 误报实例不可修复（40002）
                  value:
                    code: 40002
                    message: 状态机不允许：vulInfoStat=3 禁止 remediate
                    requestId: req-20260517-r099
                    data: null

  /instances/remediate:batch:
    post:
      tags: [instances]
      operationId: remediateInstancesBatch
      summary: 批量处置
      description: |
        需能力 `INSTANCE_REMEDIATE`。items[] 每条须含 vulInfoID。
        批次幂等 Key：`remediate:batch:{clientBatchId}`（§4.2）。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemediateInstanceBatchRequest'
      responses:
        '200':
          description: 部分成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/RemediateInstanceBatchResult'

  /instances/{vulInfoID}/verify-fix:
    post:
      tags: [instances]
      operationId: verifyFixInstance
      summary: 修复核验（单条）
      description: |
        修复后核验。需能力 `INSTANCE_VERIFY_FIX`；前置 `vulInfoStat=5`。
        平台触发异步核验扫描；完成后 Webhook `INSTANCE_VERIFY_FIX_COMPLETED`，终态 6/7/10。
      parameters:
        - $ref: '#/components/parameters/VulInstanceId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyFixInstanceRequest'
            examples:
              triggerVerifyFix:
                summary: 触发修复核验扫描
                value:
                  transferTime: '1747488000'
                  remark: 安排复扫 POC
      responses:
        '200':
          description: 业务响应（异步受理；终态通过 Webhook 通知）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VerifyFixAsyncAccepted'
              examples:
                asyncAccepted:
                  summary: 异步受理
                  value:
                    code: 0
                    message: ok
                    requestId: req-20260517-f002
                    data:
                      vulInfoID: VI-20260517-0002
                      vulInfoStat: 5
                      verifyFixStatus: RUNNING
                      verifyFixJobId: VFJ-20260517-0001
                      message: 已提交 SVMP 修复核验

  /instances/verify-fix:batch:
    post:
      tags: [instances]
      operationId: verifyFixInstanceBatch
      summary: 批量修复核验
      description: |
        部分成功；每条由 items[].vulInfoID 标识。需能力 `INSTANCE_VERIFY_FIX`。
        批次幂等 Key：`verify-fix:batch:{clientBatchId}`（§4.2）。
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyFixInstanceBatchRequest'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VerifyFixInstanceBatchResult'

  /exports/{exportId}:
    get:
      tags: [exports]
      operationId: getExport
      summary: 查询外发包元数据
      description: 需能力 `EXPORT_READ`。任务结束、验证扫描完成、修复核验扫描完成后由 Export Orchestrator 生成。
      parameters:
        - name: exportId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/ExportRecord'
              examples:
                ready:
                  summary: 外发就绪
                  value:
                    code: 0
                    message: ok
                    requestId: req-20260518-e001
                    data:
                      exportId: EXP-20260518-7f3a
                      taskId: TASK-7f3a2b1c
                      extTaskId: EXT-TASK-2026-0001
                      exportTemplateId: 1
                      format: xml
                      exportStage: TASK_COMPLETED
                      dataType: MIXED
                      status: READY
                      recordCount: 128
                      expiresAt: '2026-05-25T14:05:00Z'
                      createdAt: '2026-05-18T14:05:00Z'

  /exports/{exportId}/download:
    get:
      tags: [exports]
      operationId: downloadExport
      summary: 下载外发文件
      description: |
        需能力 `EXPORT_READ`。`format=xml` 返回单个规范化 XML 文档；
        `format=json` 返回与 XML 同构的 JSON 文档，Content-Type 依 format 而定。
        亦可使用 Webhook `EXPORT_READY` 中的短期 `downloadUrl`。
      parameters:
        - name: exportId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 外发文件流
          content:
            application/xml:
              schema:
                type: string
                description: 根元素为 TaskExport 的规范化 XML 文档
            application/json:
              schema:
                $ref: '#/components/schemas/TaskExportEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /tasks/{taskId}/exports:
    get:
      tags: [exports]
      operationId: listTaskExports
      summary: 查询任务下的外发记录
      description: 需能力 `EXPORT_READ`。
      parameters:
        - $ref: '#/components/parameters/TaskId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: 业务响应
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          page:
                            type: integer
                          size:
                            type: integer
                          total:
                            type: integer
                          items:
                            type: array
                            items:
                              $ref: '#/components/schemas/ExportRecord'

webhooks:
  platformCallback:
    post:
      tags: [webhooks]
      operationId: receivePlatformWebhook
      summary: 平台事件回调（Partner 实现）
      description: |
        由平台向 Partner 注册的 `callbackUrl` 投递（非本平台提供的路径）。
        签名校验：`X-Webhook-Signature`、`X-Webhook-Timestamp`（5 分钟有效）。
      parameters:
        - name: X-Webhook-Signature
          in: header
          required: true
          schema:
            type: string
        - name: X-Webhook-Timestamp
          in: header
          required: true
          schema:
            type: string
            description: Unix 时间戳（秒）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformWebhookEvent'
            examples:
              taskCompleted:
                summary: 任务完成回调
                value:
                  eventId: evt-20260517-0001
                  eventType: TASK_COMPLETED
                  occurredAt: '2026-05-17T14:00:00Z'
                  partnerId: partner-demo-01
                  payload:
                    extTaskId: EXT-TASK-2026-0001
                    taskId: TASK-7f3a2b1c
                    status: FINISHED
                    summary:
                      totalInstances: 25
                      verifiedValid: 18
                      falsePositive: 5
              verifyFixCompleted:
                summary: 修复核验完成回调
                value:
                  eventId: evt-20260517-0003
                  eventType: INSTANCE_VERIFY_FIX_COMPLETED
                  occurredAt: '2026-05-17T15:00:00Z'
                  partnerId: partner-demo-01
                  payload:
                    vulInfoID: VI-20260517-0002
                    vulInfoStat: 6
                    previousVulInfoStat: 5
              exportReady:
                summary: 外发包就绪
                value:
                  eventId: evt-20260518-0002
                  eventType: EXPORT_READY
                  occurredAt: '2026-05-18T14:05:00Z'
                  partnerId: partner-demo-01
                  payload:
                    exportId: EXP-20260518-7f3a
                    taskId: TASK-7f3a2b1c
                    extTaskId: EXT-TASK-2026-0001
                    exportTemplateId: 1
                    format: xml
                    exportStage: TASK_COMPLETED
                    dataType: MIXED
                    recordCount: 128
                    downloadUrl: https://vuln-platform.example.com/download/EXP-20260518-7f3a
      responses:
        '200':
          description: Partner 接收成功（建议 body `{"received":true}`）
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
              examples:
                ack:
                  value:
                    received: true
        '4XX':
          description: Partner 拒绝；平台将按策略重试

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Partner 访问令牌（v1.0.0 唯一支持的 REST 鉴权方式）

  parameters:
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
      description: 平台内部任务 ID
    VulInstanceId:
      name: vulInfoID
      in: path
      required: true
      schema:
        type: string
      description: 系统漏洞实例 ID（部侧 vulInfoID，漏洞实例主键）
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: |
        写操作幂等键，详见接口规范 §4.2。
        创建任务：与 extTaskId 二选一。
        实例单条：{动作}:{vulInfoID}:{clientRequestId}。
        实例批量：{动作}:batch:{clientBatchId}。
        平台按 (partnerId, Key) 缓存响应，默认 24 小时。
    Page:
      name: page
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
        default: 1
    Size:
      name: size
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 20

  responses:
    Unauthorized:
      description: 鉴权失败（code 40101）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
          example:
            code: 40101
            message: unauthorized
            data: null
            requestId: req-401
    Forbidden:
      description: 能力未开通（code 40301）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'
    TooManyRequests:
      description: 限流（code 42901）
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiResponse'

  schemas:
    ApiResponse:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          type: integer
          description: |
            业务状态码。0=成功。
            常见：40001 参数错误，40002 状态机不允许，40005 处置互斥，
            40101 鉴权失败，40301 能力未开通，40901 幂等冲突，50001 引擎失败
          examples: [0]
        message:
          type: string
          examples: [ok]
        data:
          nullable: true
          description: 成功时承载业务数据；失败时为 null 或错误详情
        requestId:
          type: string
          description: 请求追踪 ID

    TargetType:
      type: string
      enum: [IPV4, IPV6, URL]

    VulnType:
      type: integer
      description: 漏洞类型（1=系统漏洞，2=Web 漏洞）
      enum: [1, 2]
      x-enum-descriptions:
        - 系统漏洞
        - Web漏洞

    VulLevel:
      type: integer
      minimum: 1
      maximum: 5
      description: 危害等级（部侧 vulLevel）

    TaskPriority:
      type: string
      enum: [LOW, MEDIUM, HIGH]

    TaskAcceptStatus:
      type: string
      enum: [ACCEPTED, QUEUED, REJECTED]

    TaskProgressStatus:
      type: string
      enum: [PENDING, RUNNING, FINISHED, FAILED]

    VulInfoStat:
      type: integer
      description: 系统漏洞状态，部侧附录 A.8（vulInfoStat）
      minimum: 0
      maximum: 10
      examples: [1, 2, 5, 9]

    LvRsnCode:
      type: integer
      description: 映射部侧 lvRsn（A.23）
      enum: [101, 102, 103, 104, 105, 107, 108, 109, 999]

    VerifyResult:
      type: string
      enum: [VALID, FALSE_POSITIVE]

    VerifyFixResult:
      type: string
      description: 修复核验结果；FIXED→vulInfoStat=6，NOT_FIXED→7，FAILED→10
      enum: [FIXED, NOT_FIXED, FAILED]

    VerifyFixStatus:
      type: string
      description: 触发引擎异步核验时的受理状态
      enum: [PENDING, RUNNING]

    IsAccess:
      type: integer
      description: 部侧 isAccess，0=内网，1=互联网
      enum: [0, 1]

    ScanTaskOptions:
      type: object
      properties:
        portScope:
          type: string
          example: '1-65535'
        isLiveProbe:
          type: boolean
          default: true
        pswdGuessEnabled:
          type: boolean
          default: false

    TaskType:
      type: integer
      description: 任务类型，见接口规范附录 F
      enum: [1, 2, 3]

    ExportFormatId:
      type: integer
      description: 扫描结果外发序列化格式；0=JSON，1=XML
      enum: [0, 1]
      default: 0

    CreateScanTaskByFileRequest:
      type: object
      required: [extTaskId, taskName, type, file]
      properties:
        extTaskId:
          type: string
          maxLength: 128
        taskName:
          type: string
          maxLength: 256
        type:
          type: integer
          enum: [2, 3]
          description: 2=WEB 应用扫描，3=口令猜测
        file:
          type: string
          description: |
            任务配置 XML 正文（UTF-8），根元素 ScanTask。
            结构与校验规则见接口规范附录 G；示例见 templates/xml/scan-task-*-example.xml。

    CreateVulnScanTaskRequest:
      type: object
      required: [extTaskId, taskName, type, targets]
      properties:
        extTaskId:
          type: string
          maxLength: 128
          description: Partner 幂等键（仅创建任务使用，查询类接口不需要）
        taskName:
          type: string
          maxLength: 256
        type:
          type: integer
          enum: [1]
          description: 漏洞扫描，见接口规范附录 F
        targets:
          type: array
          minItems: 1
          items:
            type: string
          description: |
            扫描目标（IPv4/IPv6/URL，平台自动识别）。
            含 IPv6 时建议 RFC 5952 规范格式；入参与回显可能不一致。
        callbackUrl:
          type: string
          format: uri
          description: 覆盖 Partner 默认回调地址
        scanTemplateId:
          type: integer
          default: 0
          description: 缺省 0 表示按 type 自动匹配扫描策略；非 0 时使用指定模板 ID
        srcMethod:
          type: integer
          description: 资产扫描/处置方式，见接口规范附录 D；传入则覆盖 scanTemplateId 默认处置方式
        exportTemplateId:
          $ref: '#/components/schemas/ExportFormatId'
        priority:
          $ref: '#/components/schemas/TaskPriority'
        options:
          $ref: '#/components/schemas/ScanTaskOptions'

    CreateTaskRequest:
      description: 已废弃别名；请使用 CreateScanTaskByFileRequest 或 CreateVulnScanTaskRequest
      oneOf:
        - $ref: '#/components/schemas/CreateScanTaskByFileRequest'
        - $ref: '#/components/schemas/CreateVulnScanTaskRequest'

    CreateTaskResponse:
      type: object
      required: [extTaskId, taskId, status, createdAt]
      properties:
        extTaskId:
          type: string
        taskId:
          type: string
        status:
          $ref: '#/components/schemas/TaskAcceptStatus'
        createdAt:
          type: string
          format: date-time
        message:
          type: string
          description: status=REJECTED 时的原因说明

    TaskProgress:
      type: object
      required: [taskId, status]
      properties:
        extTaskId:
          type: string
        taskId:
          type: string
        status:
          $ref: '#/components/schemas/TaskProgressStatus'
        progress:
          type: integer
          minimum: 0
          maximum: 100
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        errorMessage:
          type: string

    TaskSummary:
      description: |
        任务列表项。必须包含 taskId，供 Partner 调用 GET /tasks/{taskId}；
        查询列表时无需传 extTaskId，但响应中会回显 extTaskId（若有）。
      allOf:
        - $ref: '#/components/schemas/TaskProgress'
        - type: object
          required: [taskName, createdAt]
          properties:
            taskName:
              type: string
            createdAt:
              type: string
              format: date-time

    TaskListPage:
      type: object
      required: [items, page, size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskSummary'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer

    InstanceSearchRequest:
      type: object
      required: [page, size]
      properties:
        taskId:
          type: string
          description: 平台任务 ID；调 SVMP 时仅传映射后的 SVMP taskId
        extTaskId:
          type: string
          description: 可选；平台解析为 taskId，不传给 SVMP
        vulInfoStatList:
          type: array
          items:
            $ref: '#/components/schemas/VulInfoStat'
        vulLevelList:
          type: array
          items:
            $ref: '#/components/schemas/VulLevel'
        page:
          type: integer
          minimum: 1
        size:
          type: integer
          minimum: 1
          maximum: 1000

    VulInfoSummary:
      type: object
      required:
        - vulInfoID
        - vulInfoStat
        - vulName
        - transferTime
      properties:
        vulInfoID:
          type: string
        vulID:
          type: string
        vulInfoStat:
          $ref: '#/components/schemas/VulInfoStat'
        lvRsn:
          $ref: '#/components/schemas/LvRsnCode'
          nullable: true
        vulName:
          type: string
        vulLevel:
          $ref: '#/components/schemas/VulLevel'
        orgVulId:
          type: string
        vulNetAddr:
          type: string
        vulPort:
          type: integer
        vulSvc:
          type: string
        isAccess:
          $ref: '#/components/schemas/IsAccess'
        transferTime:
          type: string
          description: 状态变更时间（部侧多为 Unix 秒字符串）
        vulnDisposalId:
          type: string
          description: SVMP 处置 ID（引擎映射）
        extVulnRef:
          type: string
          description: Partner 扩展引用

    InstanceListPage:
      type: object
      required: [items, page, size, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/VulInfoSummary'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer

    RemedInfo:
      type: object
      description: 修复台账（部侧 remedInfo / 表34 相关字段）
      properties:
        srcMethod:
          type: integer
          description: 处置方式 A.10，如 1050
        remedDesc:
          type: string
        fixLnk:
          type: string
          format: uri
        defDev:
          type: string
        remedTime:
          type: string
          example: '3日'

    VulInfoDetail:
      allOf:
        - $ref: '#/components/schemas/VulInfoSummary'
        - type: object
          properties:
            vulAddrType:
              type: integer
              description: 1=IPv4, 2=IPv6, 3=HTTP, 4=N/A, 5=其他
            assetID:
              type: string
            assetName:
              type: string
            vulInstCpe:
              type: string
            remedDesc:
              type: string
            fixLnk:
              type: string
            defDev:
              type: string
            remedTime:
              type: string
            srcMethod:
              type: integer
            archiveReason:
              type: string
            provincialFields:
              type: object
              additionalProperties: true
            extVulnRef:
              type: string

    VerifyInstanceRequest:
      type: object
      required: [verifyResult, operator]
      properties:
        vulnType:
          $ref: '#/components/schemas/VulnType'
          description: 可选，默认取自实例存储值
        verifyResult:
          $ref: '#/components/schemas/VerifyResult'
          description: VALID→vulInfoStat=2；FALSE_POSITIVE→vulInfoStat=3
        srcMethod:
          type: integer
          description: verifyResult=VALID 时必填（A.10，如 1021、1026）
        transferTime:
          type: string
        operator:
          type: string
        remark:
          type: string

    VerifyInstanceBatchRequest:
      type: object
      required: [items, operator]
      properties:
        operator:
          type: string
        items:
          type: array
          minItems: 1
          maxItems: 500
          items:
            type: object
            required: [vulInfoID, verifyResult]
            properties:
              vulInfoID:
                type: string
              vulnType:
                $ref: '#/components/schemas/VulnType'
              verifyResult:
                $ref: '#/components/schemas/VerifyResult'
              srcMethod:
                type: integer
                description: VALID 时必填
              transferTime:
                type: string
              remark:
                type: string

    VerifyBatchFailure:
      type: object
      required: [vulInfoID, code, message]
      properties:
        vulInfoID:
          type: string
        code:
          type: integer
        message:
          type: string

    VerifyInstanceBatchResult:
      type: object
      required: [success, failed]
      properties:
        success:
          type: array
          items:
            $ref: '#/components/schemas/InstanceTransitionResult'
        failed:
          type: array
          items:
            $ref: '#/components/schemas/VerifyBatchFailure'

    VerifyFixInstanceRequest:
      type: object
      properties:
        transferTime:
          type: string
        remark:
          type: string

    VerifyFixAsyncAccepted:
      type: object
      required: [vulInfoID, vulInfoStat, verifyFixStatus]
      properties:
        vulInfoID:
          type: string
        vulInfoStat:
          $ref: '#/components/schemas/VulInfoStat'
          description: 受理时通常为 5
        verifyFixStatus:
          $ref: '#/components/schemas/VerifyFixStatus'
        verifyFixJobId:
          type: string
        message:
          type: string

    VerifyFixInstanceBatchRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 500
          items:
            type: object
            required: [vulInfoID]
            properties:
              vulInfoID:
                type: string
              transferTime:
                type: string
              remark:
                type: string

    VerifyFixInstanceBatchResult:
      type: object
      required: [success, failed]
      properties:
        success:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/InstanceTransitionResult'
              - $ref: '#/components/schemas/VerifyFixAsyncAccepted'
        failed:
          type: array
          items:
            $ref: '#/components/schemas/VerifyBatchFailure'

    RemediateInstanceRequest:
      type: object
      required:
        - srcMethod
        - srcTktRole
        - dstTktRole
        - assignerDept
        - handlerDept
      properties:
        srcMethod:
          type: integer
          description: A.10；可修复类 1050–1053→5；修复失败/备案→9 须 lvRsn（附录 E）
        remedDesc:
          type: string
        fixLnk:
          type: string
          format: uri
          description: srcMethod=1050 时必填
        defDev:
          type: string
          description: srcMethod=1051 或 1052 时必填
        remedTime:
          type: string
          pattern: '^\d+(日|周|月)$'
          example: '3日'
        lvRsn:
          $ref: '#/components/schemas/LvRsnCode'
        archiveReason:
          type: string
        approvedBy:
          type: string
        recordAt:
          type: string
        provincialFields:
          type: object
          additionalProperties: true
        srcTktRole:
          type: integer
          description: 派单角色（必填），见接口规范附录 C
        dstTktRole:
          type: integer
          description: 处置角色（必填），见接口规范附录 C
        assignerDept:
          type: string
          description: 派单人部门（必填）
        assignerEmail:
          type: string
          description: 派单人邮箱；与 assignerPhone 至少填一项
        assignerPhone:
          type: string
          description: 派单人电话；与 assignerEmail 至少填一项
        handlerDept:
          type: string
          description: 处置人部门（必填）
        handlerEmail:
          type: string
          description: 处置人邮箱；与 handlerPhone 至少填一项
        handlerPhone:
          type: string
          description: 处置人电话；与 handlerEmail 至少填一项
        transferTime:
          type: string
        remark:
          type: string

    RemediateInstanceBatchRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 500
          items:
            allOf:
              - type: object
                required: [vulInfoID]
                properties:
                  vulInfoID:
                    type: string
              - $ref: '#/components/schemas/RemediateInstanceRequest'

    RemediateInstanceBatchResult:
      type: object
      required: [success, failed]
      properties:
        success:
          type: array
          items:
            $ref: '#/components/schemas/InstanceTransitionResult'
        failed:
          type: array
          items:
            $ref: '#/components/schemas/VerifyBatchFailure'

    InstanceTransitionResult:
      type: object
      required: [vulInfoID, vulInfoStat]
      properties:
        vulInfoID:
          type: string
        vulInfoStat:
          $ref: '#/components/schemas/VulInfoStat'
        lvRsn:
          $ref: '#/components/schemas/LvRsnCode'
          nullable: true
        transferTime:
          type: string
        srcMethod:
          type: integer
        remedDesc:
          type: string
        archiveReason:
          type: string

    PlatformWebhookEventType:
      type: string
      enum:
        - TASK_COMPLETED
        - TASK_FAILED
        - INSTANCE_VERIFY_FIX_COMPLETED
        - EXPORT_READY

    TaskCompletedPayload:
      type: object
      properties:
        extTaskId:
          type: string
        taskId:
          type: string
        status:
          type: string
          enum: [FINISHED, FAILED]
        summary:
          type: object
          properties:
            totalInstances:
              type: integer
            verifiedValid:
              type: integer
            falsePositive:
              type: integer

    InstanceEventPayload:
      type: object
      properties:
        vulInfoID:
          type: string
        vulInfoStat:
          $ref: '#/components/schemas/VulInfoStat'
        previousVulInfoStat:
          $ref: '#/components/schemas/VulInfoStat'

    TaskExportEnvelope:
      type: object
      required: [taskExport]
      properties:
        taskExport:
          $ref: '#/components/schemas/TaskExportDocument'

    TaskExportDocument:
      type: object
      description: 扫描结果外发规范化文档；XML 根元素为 TaskExport，JSON 顶层 key 为 taskExport。
      required: [export, task]
      properties:
        export:
          type: object
          required: [exportId, format, exportStage, dataType, generatedAt, recordCount]
          properties:
            exportId:
              type: string
            format:
              type: string
              enum: [xml, json]
            exportTemplateId:
              $ref: '#/components/schemas/ExportFormatId'
            exportStage:
              $ref: '#/components/schemas/ExportStage'
            dataType:
              $ref: '#/components/schemas/ExportDataType'
            generatedAt:
              type: string
              format: date-time
            expiresAt:
              type: string
              format: date-time
            recordCount:
              type: integer
        task:
          type: object
          required: [taskId, taskName, type, status]
          properties:
            taskId:
              type: string
            extTaskId:
              type: string
            taskName:
              type: string
            targetType:
              type: string
              enum: [IPV4, IPV6, URL]
            type:
              $ref: '#/components/schemas/TaskType'
            scanTemplateId:
              type: integer
            status:
              type: string
            startedAt:
              type: string
              format: date-time
            finishedAt:
              type: string
              format: date-time
        summary:
          type: object
          additionalProperties: true
        targets:
          type: array
          items:
            $ref: '#/components/schemas/TaskExportTarget'
        liveProbeResults:
          type: array
          items:
            $ref: '#/components/schemas/TaskExportLiveProbeResult'
        portScanResults:
          type: array
          items:
            $ref: '#/components/schemas/TaskExportPortScanResult'
        vulnerabilities:
          type: array
          items:
            $ref: '#/components/schemas/TaskExportVulnerability'
        weakPasswords:
          type: array
          items:
            $ref: '#/components/schemas/TaskExportWeakPassword'
        baselineResults:
          type: array
          items:
            $ref: '#/components/schemas/TaskExportBaselineResult'
        appendices:
          type: array
          items:
            $ref: '#/components/schemas/TaskExportAppendix'

    ExportStage:
      type: string
      description: 外发触发阶段。
      enum:
        - TASK_COMPLETED
        - VERIFY_SCAN
        - VERIFY_FIX_SCAN

    ExportDataType:
      type: string
      description: 外发数据类型；验证扫描和修复核验扫描固定为 SYSTEM_VULNERABILITY。
      enum:
        - MIXED
        - SYSTEM_VULNERABILITY
        - LIVE_PROBE
        - PORT_SCAN

    TaskExportTarget:
      type: object
      required: [targetId, target, targetType]
      properties:
        targetId:
          type: string
        target:
          type: string
        targetType:
          type: string
          enum: [IPV4, IPV6, URL]
        assetID:
          type: string
        assetName:
          type: string
        site:
          type: string
        os:
          type: string
        riskValue:
          type: number
        riskLevel:
          type: integer

    TaskExportLiveProbeResult:
      type: object
      required: [liveProbeId, targetId, address, alive]
      properties:
        liveProbeId:
          type: string
        targetId:
          type: string
        address:
          type: string
        alive:
          type: boolean
        probeMethod:
          type: string
          description: 探测方式，如 ICMP / TCP / ARP。
        latencyMs:
          type: integer
          description: 响应耗时，单位毫秒。
        mac:
          type: string
        osGuess:
          type: string
        detectedAt:
          type: string
          format: date-time

    TaskExportPortScanResult:
      type: object
      required: [portScanId, targetId, address, port, protocol, state]
      properties:
        portScanId:
          type: string
        targetId:
          type: string
        address:
          type: string
        port:
          type: integer
          minimum: 0
          maximum: 65535
        protocol:
          type: string
          description: TCP / UDP 等。
        state:
          type: string
          description: open / closed / filtered 等。
        service:
          type: string
        banner:
          type: string
        version:
          type: string
        detectedAt:
          type: string
          format: date-time

    TaskExportVulnerabilityInstance:
      type: object
      required: [vulInfoID, targetId, vulInfoStat, transferTime]
      properties:
        vulInfoID:
          type: string
        targetId:
          type: string
        vulInfoStat:
          $ref: '#/components/schemas/VulInfoStat'
        lvRsn:
          type: integer
        vulNetAddr:
          type: string
        vulPort:
          type: integer
        vulSvc:
          type: string
        isAccess:
          type: integer
          enum: [0, 1]
        transferTime:
          type: string
        srcMethod:
          type: integer
        extVulnRef:
          type: string
        evidence:
          type: object
          additionalProperties: true
        remediation:
          type: object
          additionalProperties: true

    TaskExportVulnerability:
      type: object
      required: [vulID, vulName, instances]
      properties:
        vulID:
          type: string
          description: 产品漏洞编号（外发包内唯一聚合键）
        orgVulId:
          type: string
        vulLevel:
          type: integer
        vulName:
          type: string
        vulDesc:
          type: string
        instances:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/TaskExportVulnerabilityInstance'

    TaskExportWeakPassword:
      type: object
      required: [weakPasswordId, targetId, service, username]
      properties:
        weakPasswordId:
          type: string
        targetId:
          type: string
        vulInfoID:
          type: string
        service:
          type: string
        port:
          type: integer
        protocol:
          type: string
        username:
          type: string
        passwordMasked:
          type: string
          description: 脱敏后的口令，不输出明文。

    TaskExportBaselineResult:
      type: object
      required: [baselineResultId, targetId, checkName, result]
      properties:
        baselineResultId:
          type: string
        targetId:
          type: string
        templateName:
          type: string
        checkName:
          type: string
        groupName:
          type: string
        riskValue:
          type: number
        result:
          type: string
        solution:
          type: string

    TaskExportAppendix:
      type: object
      required: [appendixId, name, columns, rows]
      properties:
        appendixId:
          type: string
        targetId:
          type: string
        name:
          type: string
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: array
            items:
              type: string

    ExportReadyPayload:
      type: object
      required: [exportId, taskId, format, exportStage, dataType]
      properties:
        exportId:
          type: string
        taskId:
          type: string
        extTaskId:
          type: string
        exportTemplateId:
          $ref: '#/components/schemas/ExportFormatId'
        format:
          type: string
          description: 扫描结果外发输出物格式；xml 与 json 使用相同规范化字段。
          enum:
            - xml
            - json
        exportStage:
          $ref: '#/components/schemas/ExportStage'
        dataType:
          $ref: '#/components/schemas/ExportDataType'
        recordCount:
          type: integer
        downloadUrl:
          type: string
          format: uri
          description: 可选预签名下载 URL（短期有效）

    ExportRecord:
      type: object
      required: [exportId, taskId, format, exportStage, dataType, status]
      properties:
        exportId:
          type: string
        taskId:
          type: string
        extTaskId:
          type: string
        exportTemplateId:
          $ref: '#/components/schemas/ExportFormatId'
        format:
          type: string
          description: 扫描结果外发输出物格式；取值为 xml 或 json。
          enum:
            - xml
            - json
        exportStage:
          $ref: '#/components/schemas/ExportStage'
        dataType:
          $ref: '#/components/schemas/ExportDataType'
        status:
          type: string
          enum: [PENDING, READY, EXPIRED, FAILED]
        recordCount:
          type: integer
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        downloadUrl:
          type: string
          format: uri

    PlatformWebhookEvent:
      type: object
      required: [eventId, eventType, occurredAt, partnerId, payload]
      properties:
        eventId:
          type: string
        eventType:
          $ref: '#/components/schemas/PlatformWebhookEventType'
        occurredAt:
          type: string
          format: date-time
        partnerId:
          type: string
        payload:
          oneOf:
            - $ref: '#/components/schemas/TaskCompletedPayload'
            - $ref: '#/components/schemas/InstanceEventPayload'
            - $ref: '#/components/schemas/ExportReadyPayload'
          description: 结构随 eventType 变化
