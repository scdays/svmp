# 四阶段 XML 外发包（推荐）；legacy txt 见 deprecatedLegacyFiles
exportTemplateId: tpl-svmp-xml-scan-bundle
displayName: SVMP 扫描结果（四阶段 XML）
match:
  exportPackageProfile: svmp-xml-phases
  # 按任务能力命中子文件（未启用的阶段可不产出对应 XML）
  capabilities:
    liveCheck: optional
    portScan: optional
    vulnScan: optional
    weakPasswordScan: optional
  engineTaskTypes: [1, 4, 5, 8, 16]  # TASK_SYS_SCAN / PWD / SYS_PWD / WEB / ASSET_FIND
output:
  format: SVMP-TAR-GZ-XML
  encoding: UTF-8
  fileNamePattern: 'svmp-export-{taskId}-{occurredAt}.tar.gz'
  packageFiles:
    - 主机存活探测结果.xml
    - 端口扫描结果.xml
    - 系统漏洞扫描结果.xml
    - 弱口令扫描结果.xml
  deprecatedLegacyFiles:
    - task_info.txt
    - asset_info.txt
    - asset_vuls.txt
    - vul_info.txt
    - asset_pwds.txt
trigger:
  on: TASK_COMPLETED
filter:
  vulInfoStatList: [1, 2, 3, 5, 6, 7, 8, 9, 10]
phases:
  live:
    file: 主机存活探测结果.xml
    rootElement: LiveProbeResult
    capability: liveCheck
    fields:
      - target: assetKey
        source: assetKey  # 扫描目标对应资产 库资产 IP
      - target: assetName
        source: assetName  # 对应的 TVM 资产管 理中的资产 名称
      - target: baseInfo
        source: baseInfo  # 任务基础信息
      - target: device
        source: device  # 任务设备信息 {
      - target: execType
        source: execType  # 执行方式
      - target: hostCount
        source: hostCount  # 任务存活目标 数
      - target: icmp
        source: icmp  # 是否开启 ICM P PING
      - target: id
        source: id  # 任务策略 ID
      - target: ipType
        source: ipType  # IP 类型（ IPv4/IPv6 /URL ）
      - target: live
        source: live  # 是否开启主机 存活测试
      - target: liveArp
        source: liveArp  # 口令猜测配置
      - target: liveCheck
        source: liveCheck  # 存活探测配置
      - target: os
        source: os  # 操作系统
      - target: ports
        source: ports  # TCP PING 端口范围
      - target: product
        source: product  # 任务涉及设备 型号
      - target: scanInfo
        source: scanInfo
      - target: scanTimes
        source: scanTimes  # 扫描次数
      - target: source
        source: source  # 数据来源
      - target: status
        source: status  # 当前风险同步状态
      - target: summary
        source: summary  # 综述信息
      # …共 27 字段，见 phase-field-catalog.json
  port:
    file: 端口扫描结果.xml
    rootElement: PortScanResult
    capability: portScan
    fields:
      - target: assetKey
        source: assetKey  # 扫描目标对应资产 库资产 IP
      - target: assetName
        source: assetName  # 对应的 TVM 资产管 理中的资产 名称
      - target: baseInfo
        source: baseInfo  # 任务基础信息
      - target: device
        source: device  # 任务设备信息 {
      - target: execType
        source: execType  # 执行方式
      - target: geo
        source: geo  # 地理视 图
      - target: geo_id
        source: geo_id  # 地理视图 id
      - target: hostCount
        source: hostCount  # 任务存活目标 数
      - target: id
        source: id  # 任务策略 ID
      - target: ip
        source: ip  # ip
      - target: ipType
        source: ipType  # IP 类型（ IPv4/IPv6 /URL ）
      - target: mac
        source: mac  # mac
      - target: os
        source: os  # 操作系统
      - target: osName
        source: osName  # 操作系统
      - target: port
        source: port  # 发现的端口 {
      - target: portScan
        source: portScan  # 端口配置
      - target: product
        source: product  # 任务涉及设备 型号
      - target: scanInfo
        source: scanInfo
      - target: scanTimes
        source: scanTimes  # 扫描次数
      - target: software
        source: software  # 发现的服务 {
      # …共 32 字段，见 phase-field-catalog.json
  vuln:
    file: 系统漏洞扫描结果.xml
    rootElement: aurora
    format: aurora
    officialSample: 系统漏洞扫描结果.xml
    capability: vulnScan
    fields:
      - target: hostCount
        source: hostCount  # aurora/report/scanned_ip_count
      - target: riskValue
        source: riskValue  # aurora/report/targets/target/host_score
      - target: assetKey
        source: assetKey  # aurora/report/targets/target/ip
      - target: riskValue
        source: riskValue  # aurora/report/targets/target/vul_score
      - target: cnvd
        source: cnvd  # aurora/report/targets/target/vuln_detail/vuln/cncve
      - target: cnvd
        source: cnvd  # aurora/report/targets/target/vuln_detail/vuln/cnnvd
      - target: cve
        source: cve  # aurora/report/targets/target/vuln_detail/vuln/cve_id
      - target: syncTime
        source: syncTime  # aurora/report/targets/target/vuln_detail/vuln/date_found
      - target: others
        source: others  # aurora/report/targets/target/vuln_detail/vuln/description
      - target: name
        source: name  # aurora/report/targets/target/vuln_detail/vuln/name
      - target: vulLocalId
        source: vulLocalId  # aurora/report/targets/target/vuln_detail/vuln/plugin_id
      - target: cvss
        source: cvss  # aurora/report/targets/target/vuln_detail/vuln/risk_points
      - target: others
        source: others  # aurora/report/targets/target/vuln_detail/vuln/solution
      - target: others
        source: others  # aurora/report/targets/target/vuln_detail/vuln/threat_category
      - target: vulLocalId
        source: vulLocalId  # aurora/report/targets/target/vuln_detail/vuln/vul_id
      - target: others
        source: others  # aurora/report/targets/target/vuln_scanned/vuln/mess_string
      - target: port
        source: port  # aurora/report/targets/target/vuln_scanned/vuln/port
      - target: protocol
        source: protocol  # aurora/report/targets/target/vuln_scanned/vuln/protocol
      - target: service
        source: service  # aurora/report/targets/target/vuln_scanned/vuln/service
      - target: status
        source: status  # aurora/report/targets/target/vuln_scanned/vuln/vul_confirmed
      # …共 26 字段，见 phase-field-catalog.json
  weakpwd:
    file: 弱口令扫描结果.xml
    rootElement: aurora
    format: aurora
    officialSample: 弱口令扫描结果.xml
    capability: weakPasswordScan
    fields:
      - target: assetKey
        source: assetKey  # aurora/report/targets/target/ip
      - target: password
        source: password  # aurora/report/targets/target/password_results/password_result/password
      - target: service
        source: service  # aurora/report/targets/target/password_results/password_result/type
      - target: userName
        source: userName  # aurora/report/targets/target/password_results/password_result/username
      - target: name
        source: name  # aurora/report/targets/target/vuln_detail/vuln/name
      - target: weakAccountInfo
        source: weakAccountInfo  # aurora/report/targets/target/vuln_scanned/vuln/mess_string
      - target: port
        source: port  # aurora/report/targets/target/vuln_scanned/vuln/port
      - target: vulLocalId
        source: vulLocalId  # aurora/report/targets/target/vuln_scanned/vuln/vul_id
      - target: id
        source: id  # aurora/report/task/id
      - target: taskType
        source: taskType  # aurora/report/task/task_type
