    source: baseInfo
  - target: device
    source: device
  - target: execType
    source: execType
  - target: hostCount
    source: hostCount
  - target: icmp
    source: icmp
  - target: id
    source: id
  - target: ipType
    source: ipType
  - target: live
    source: live
  - target: liveArp
    source: liveArp
  - target: liveCheck
    source: liveCheck
  - target: os
    source: os
  - target: ports
    source: ports
  - target: product
    source: product
  - target: scanInfo
    source: scanInfo
  - target: scanTimes
    source: scanTimes
  - target: source
    source: source
  - target: status
    source: status
  - target: summary
    source: summary
  - target: target
    source: target
  - target: taskCount
    source: taskCount
  - target: taskSource
    source: taskSource
  - target: taskStatus
    source: taskStatus
  - target: taskType
    source: taskType
  - target: taskUuid
    source: taskUuid
  - target: tcp
    source: tcp
