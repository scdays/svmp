# 单阶段：主机存活探测 → 主机存活探测结果.xml
exportTemplateId: tpl-svmp-phase-live
displayName: 主机存活探测
match:
  capability: liveCheck
output:
  format: SVMP-XML
  encoding: UTF-8
  fileName: 主机存活探测结果.xml
  rootElement: LiveProbeResult
trigger:
  on: TASK_COMPLETED
fields:
  - target: assetKey
    source: assetKey  # 扫描目标对应资产 库资产 IP
  - target: assetName
    source: assetName  # 对应的 TVM 资产管 理中的资产 名称
  - target: baseInfo
    source: baseInfo  # 任务基础信息
  - target: device
    source: device  # 任务设备信息 {
  - target: execType
    source: execType  # 执行方式
  - target: hostCount
    source: hostCount  # 任务存活目标 数
  - target: icmp
    source: icmp  # 是否开启 ICM P PING
  - target: id
    source: id  # 任务策略 ID
  - target: ipType
    source: ipType  # IP 类型（ IPv4/IPv6 /URL ）
  - target: live
    source: live  # 是否开启主机 存活测试
  - target: liveArp
    source: liveArp  # 口令猜测配置
  - target: liveCheck
    source: liveCheck  # 存活探测配置
  - target: os
    source: os  # 操作系统
  - target: ports
    source: ports  # TCP PING 端口范围
  - target: product
    source: product  # 任务涉及设备 型号
  - target: scanInfo
    source: scanInfo
  - target: scanTimes
    source: scanTimes  # 扫描次数
  - target: source
    source: source  # 数据来源
  - target: status
    source: status  # 当前风险同步状态
  - target: summary
    source: summary  # 综述信息
  - target: target
    source: target  # 扫描目标信息
  - target: taskCount
    source: taskCount  # 策略已执行任 务数量
  - target: taskSource
    source: taskSource
  - target: taskStatus
    source: taskStatus
  - target: taskType
    source: taskType  # 任务类型
  - target: taskUuid
    source: taskUuid  # 扫描目标所在子任 务 UUID
  - target: tcp
    source: tcp  # 是否开启 TCP PING
